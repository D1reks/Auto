name: Debug CI

on: [push]

jobs:
  debug:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Show current directory
        run: pwd

      - name: List all files in root
        run: ls -la

      - name: Check gradlew specifically
        run: |
          if [ -f "gradlew" ]; then
            echo "✅ gradlew found"
            chmod +x gradlew
            file gradlew
            head -5 gradlew
          else
            echo "❌ gradlew NOT found in $(pwd)"
            echo "Searching for gradlew..."
            find . -name "gradlew" 2>/dev/null || echo "Not found anywhere"
          fi